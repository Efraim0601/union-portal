<div class="min-h-screen bg-background text-foreground">
  <header class="border-b border-border">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a routerLink="/" class="flex items-center gap-2 font-semibold tracking-tight">
        <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-primary text-primary-foreground text-sm">A</span>
        {{ title() }}
      </a>
      <nav class="flex items-center gap-1">
        <a uiBtn variant="ghost" size="sm" routerLink="/promote" routerLinkActive="bg-accent">Promote</a>
        <a uiBtn variant="ghost" size="sm" routerLink="/diaspora" routerLinkActive="bg-accent">Diaspora</a>
        @if (auth.isAuthenticated()) {
          <button uiBtn variant="outline" size="sm" (click)="auth.logout()">Déconnexion</button>
        }
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <router-outlet />
  </main>
</div>
