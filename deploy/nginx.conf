# Gateway nginx — une seule origine pour tout le portail Union.
# /                    -> shell (host)
# /remotes/promote/    -> assets statiques du remote promote (remoteEntry.json + chunks)
# /remotes/diaspora/   -> assets statiques du remote diaspora
# Même origine => localStorage 'portail_client_auth' partagé (SSO) + aucun CORS.
server {
  listen       80;
  # HTTPS (certificat auto-signé généré au démarrage — cf. docker-entrypoint.d).
  # Indispensable : les navigateurs n'autorisent la caméra (getUserMedia, selfie/KYC)
  # que sur une origine sécurisée (https:// ou http://localhost).
  listen       443 ssl;
  ssl_certificate     /etc/nginx/ssl/union.crt;
  ssl_certificate_key /etc/nginx/ssl/union.key;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Compression
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Le manifest de fédération ne doit jamais être mis en cache
  location = /federation.manifest.json {
    add_header Cache-Control "no-store";
  }

  # --- Remote: promote ---  (^~ : priorité sur le bloc regex des assets)
  # Pas d'alias : les fichiers sont physiquement sous root/remotes/promote/,
  # donc $uri se résout directement (évite les pièges alias+try_files).
  location ^~ /remotes/promote/ {
    try_files $uri $uri/ /remotes/promote/index.html;
    add_header Access-Control-Allow-Origin "*";
  }

  # --- Remote: diaspora ---
  location ^~ /remotes/diaspora/ {
    try_files $uri $uri/ /remotes/diaspora/index.html;
    add_header Access-Control-Allow-Origin "*";
  }

  # --- Backends API (origine unique) ---------------------------------------
  # Cible par défaut : backend sur la MACHINE HÔTE (host.docker.internal, activé
  # par `extra_hosts: host-gateway` dans docker-compose). Pour un backend
  # conteneurisé, remplacer par le nom du service (ex. http://promote-backend:8390).
  #
  # proxy_pass STATIQUE : nginx résout le nom au démarrage via /etc/hosts.
  # `host.docker.internal` y est injecté par `extra_hosts: host-gateway`
  # (docker-compose) ou `--add-host` (docker run) -> résolution OK, nginx démarre.
  # Pour un backend conteneurisé, remplacer par le nom du service (ex. backend:8390)
  # et mettre le conteneur union sur le même réseau docker.

  # promote (staff : login, ventes, stats) : /promote-api/* -> backend /api/*
  # Upstream paramétrable via l'env PROMOTE_UPSTREAM (substitué par envsubst au
  # démarrage — cf. /etc/nginx/templates). Défaut : host.docker.internal:8390.
  location ^~ /promote-api/ {
    rewrite ^/promote-api/(.*)$ /api/$1 break;
    proxy_pass http://${PROMOTE_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Portail et API sont SERVIS SUR LA MÊME ORIGINE (gateway). L'en-tête Origin
    # du navigateur, transmis au backend, le ferait rejeter (« Invalid CORS request »).
    # On le neutralise : le backend voit alors une requête same-origin normale.
    proxy_set_header Origin "";
  }
  # diaspora (onboarding) : /api/* -> backend diaspora (paramétrable DIASPORA_UPSTREAM)
  location ^~ /api/ {
    proxy_pass http://${DIASPORA_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin "";
  }

  # --- Back-office diaspora (server-rendered) : pages + assets -> backend diaspora ---
  # Le back-office est rendu par le backend FastAPI diaspora (mêmes URLs racine
  # /backoffice/*, /static/*, /uploads/*). Auth cookie-session, même origine que /api.
  # ^~ : priorité sur le bloc regex des assets ci-dessous (sinon /static/*.css serait
  # capté par le cache d'assets et renverrait 404 au lieu d'être proxifié).
  location ^~ /backoffice/ {
    proxy_pass http://${DIASPORA_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin "";
  }
  location ^~ /static/ {
    proxy_pass http://${DIASPORA_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin "";
  }
  location ^~ /uploads/ {
    proxy_pass http://${DIASPORA_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin "";
  }

  # --- Host shell (SPA) : tout le reste retombe sur index.html ---
  # /promote et /diaspora sont des routes CLIENT du shell (pas de collision
  # avec /remotes/... ci-dessus) : elles chargent les remotes dynamiquement.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long pour les assets hashés
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
